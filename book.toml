[book]
authors = ["darkforestry"]
language = "en"
multilingual = false
src = "book"
title = "amms-rs"
description = "A book for all things amms-rs"

[output.html]
theme = "book/theme"
git-repository-url = "https://github.com/darkforestry/amms-rs"
default-theme = "ayu"
no-section-label = true
additional-js = [
    "specs/static/mermaid.min.js",
    "specs/static/mermaid-init.js",
    "specs/static/solidity-min.js",
]

[output.html.fold]
enable = true
level = 1

[build]
build-dir = "target/book"

[preprocessor.template]
before = ["links"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
